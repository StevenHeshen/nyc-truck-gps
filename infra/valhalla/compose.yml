services:
  valhalla:
    image: ghcr.io/valhalla/valhalla-scripted:latest
    container_name: nyc-truck-gps-valhalla
    restart: unless-stopped
    ports:
      - "127.0.0.1:8002:8002"
    volumes:
      - ./custom_files:/custom_files
    environment:
      tile_urls: https://download.geofabrik.de/north-america/us/new-york-latest.osm.pbf
      use_tiles_ignore_pbf: "False"
      force_rebuild: "False"
      build_elevation: "False"
      build_admins: "True"
      build_time_zones: "True"
      build_tar: "True"
      server_threads: "2"
      serve_tiles: "True"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8002/status"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 10m
    deploy:
      resources:
        limits:
          memory: 6G
